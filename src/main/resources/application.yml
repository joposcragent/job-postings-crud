management:
  endpoint:
    enabled-by-default: true
  endpoints:
    web:
      exposure:
        include: "*"

spring:
  application:
    name: job-postings-crud
  datasource:
    url: jdbc:postgresql://localhost:5432/joposcragent
    username: postgres
    password: postgres

celery:
  orchestrator:
    base-url: http://celery-orchestrator-api:8000

---
spring:
  config:
    activate:
      on-profile: local

server:
  port: 8089

celery:
  orchestrator:
    base-url: http://localhost:8001

---
spring:
  config:
    activate:
      on-profile: protozoa

server:
  port: 8089

celery:
  orchestrator:
    base-url: http://localhost:8090